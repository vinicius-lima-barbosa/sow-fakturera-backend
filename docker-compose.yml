version: "3.8"
services:
  database:
    image: postgres:17-alpine
    container_name: app_sow_fakturera_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - app_sow_fakturera_pg_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: sow_fakturera_api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - database

volumes:
  app_sow_fakturera_pg_data:
